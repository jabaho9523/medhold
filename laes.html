<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Medhold</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<style>
  :root { --ink:#1a1a1a; --dim:#6b6b6b; --bg:#fdfdfb; --accent:#0a5c36; }
  * { box-sizing:border-box; }
  body { margin:0; font:17px/1.65 Georgia,'Times New Roman',serif; color:var(--ink); background:var(--bg); }
  header { font-family:system-ui,sans-serif; font-size:14px; padding:16px 20px; border-bottom:1px solid #e5e5e0; display:flex; justify-content:space-between; align-items:center; }
  header a { color:var(--accent); text-decoration:none; }
  main { max-width:680px; margin:0 auto; padding:36px 20px 72px; }
  h1,h2,h3 { font-weight:normal; line-height:1.25; }
  h1 { font-size:30px; } h2 { font-size:22px; margin-top:2em; } h3 { font-size:18px; }
  blockquote { border-left:3px solid #d3d3cc; margin:1em 0; padding:2px 18px; color:#444; background:#f6f6f2; }
  code, pre { font-family:ui-monospace,Menlo,monospace; font-size:14px; background:#f1f1ec; border-radius:4px; }
  code { padding:1px 5px; } pre { padding:14px; overflow-x:auto; } pre code { padding:0; background:none; }
  table { border-collapse:collapse; width:100%; font-size:15px; }
  th, td { border:1px solid #e0e0da; padding:8px 10px; text-align:left; vertical-align:top; }
  th { font-family:system-ui,sans-serif; font-size:13px; background:#f4f4ef; }
  a { color:var(--accent); }
  .kopier { font-family:system-ui,sans-serif; font-size:15px; padding:9px 16px; border:1.5px solid var(--ink); background:var(--ink); color:#fff; border-radius:5px; cursor:pointer; }
  .toast { position:fixed; bottom:26px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; font-family:system-ui,sans-serif; font-size:15px; padding:12px 22px; border-radius:6px; opacity:0; transition:opacity .25s; pointer-events:none; }
  .toast.show { opacity:1; }
</style>
</head>
<body>
<header>
  <a href="index.html">← Medhold</a>
  <button class="kopier" id="kopier" hidden>Kopiér hele teksten</button>
</header>
<main id="indhold"><p>Henter…</p></main>
<div class="toast" id="toast">Kopieret! Åbn din AI, indsæt teksten, og tryk send.</div>
<script>
// Kun kendte filer kan vises
const OK = /^(moduler\/|bibliotek\/)?[A-Za-z0-9_\-]+\.md$/;
const f = new URLSearchParams(location.search).get('f') || '';
let raa = '';
(async () => {
  const m = document.getElementById('indhold');
  if (!OK.test(f)) { m.innerHTML = '<p>Filen findes ikke. <a href="index.html">Til forsiden</a></p>'; return; }
  try {
    const r = await fetch(f);
    if (!r.ok) throw new Error();
    raa = await r.text();
    m.innerHTML = marked.parse(raa);
    // Kopiér-knappen vises kun for modul-filer (dem man skal indsætte i sin AI)
    if (f.startsWith('moduler/')) document.getElementById('kopier').hidden = false;
    document.title = 'Medhold — ' + f.replace(/^.*\//,'').replace('.md','').replace(/_/g,' ');
  } catch (e) { m.innerHTML = '<p>Kunne ikke hente filen. <a href="' + f + '">Åbn den direkte</a>.</p>'; }
})();
document.getElementById('kopier').addEventListener('click', async () => {
  await navigator.clipboard.writeText(raa);
  const t = document.getElementById('toast');
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
});
</script>
<script data-goatcounter="https://medhold.goatcounter.com/count" async src="https://gc.zgo.at/count.js"></script>
</body>
</html>
